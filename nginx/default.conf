# Rate limit configuration for pipeline trigger endpoint ONLY, allowing 1 request per minute per IP address with a burst of 1 request. This helps prevent abuse of the pipeline trigger endpoint while allowing legitimate usage. The limit_req_status directive returns a 429 Too Many Requests response when the rate limit is exceeded.
limit_req_zone $binary_remote_addr zone=pipeline_trigger_limit:10m rate=1r/m;

server {
    listen 80 default_server;
    server_name localhost;
    root /app/frontend/dist;  ## Serving Static UI files from Nginx, created by npm run build in frontend stage of Dockerfile
    index index.html;

    # Let established upstream requests wait up to 5 minutes before timing out.
    # This helps when the app is running but takes a long time to respond.
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Serve a user-friendly page for upstream/server failures instead of the default Nginx error HTML.
    error_page 500 502 503 504 /error_page.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    location = /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /api/v1/pipeline/trigger {
        limit_except POST {
            deny all;
        }

        limit_req zone=pipeline_trigger_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /api/v1/pipeline/trigger/ {
        return 308 /api/v1/pipeline/trigger;
    }

    location ^~ /api/v1/schemes {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ^~ /api/v1/users {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ^~ /api {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /error_page.html {
        internal;
    }
}
