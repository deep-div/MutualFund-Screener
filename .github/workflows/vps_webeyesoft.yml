name: VPS Docker Deploy (WebEyeSoft)

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fundscreener:v1.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-on-vps:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_PASSWORD
          script: |
            set -e

            docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
            docker pull "$DOCKERHUB_USERNAME/fundscreener:v1.0"

            docker stop fundscreener || true
            docker rm fundscreener || true

            docker run -d \
              --name fundscreener \
              --restart always \
              -p 80:80 \
              "$DOCKERHUB_USERNAME/fundscreener:v1.0"

            docker image prune -f
