name: Build Docker Image and Deploy to Render
  
on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_complete_workflow:
        description: "Run complete workflow now"
        required: true
        default: false
        type: boolean

env:
  WORKFLOW_ENABLED: "false" # Set to "false" to disable this workflow's jobs.

concurrency:
  group: docker-render-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-toggle:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.set-enabled.outputs.enabled }}
    steps:
      - name: Read workflow toggle
        id: set-enabled
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "enabled=${{ inputs.run_complete_workflow }}" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=${{ env.WORKFLOW_ENABLED }}" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    if: ${{ needs.workflow-toggle.outputs.enabled == 'true' }}
    needs: workflow-toggle
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fundscreener:v1.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-render:
    if: ${{ needs.workflow-toggle.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest
    needs: [workflow-toggle, build-and-push]

    steps:
      - name: Update Render image URL in service settings
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail

          if [ -z "${RENDER_API_KEY}" ] || [ -z "${RENDER_SERVICE_ID}" ] || [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "Missing one of required secrets: RENDER_API_KEY, RENDER_SERVICE_ID, DOCKERHUB_USERNAME."
            exit 1
          fi

          IMAGE_PATH="docker.io/${DOCKERHUB_USERNAME}/fundscreener:v1.0"

          SERVICE_JSON="$(curl --fail --show-error --silent \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}")"

          OWNER_ID="$(echo "${SERVICE_JSON}" | jq -r '.ownerId // empty')"
          REGISTRY_CRED_ID="$(echo "${SERVICE_JSON}" | jq -r '.registryCredential.id // empty')"

          if [ -z "${OWNER_ID}" ]; then
            echo "Could not read ownerId from Render service."
            exit 1
          fi

          if [ -z "${REGISTRY_CRED_ID}" ]; then
            echo "No registry credential linked to this Render service. Link Docker Hub credentials in Render UI first."
            exit 1
          fi

          PATCH_BODY="$(jq -nc \
            --arg ownerId "${OWNER_ID}" \
            --arg imagePath "${IMAGE_PATH}" \
            --arg registryCredentialId "${REGISTRY_CRED_ID}" \
            '{image:{ownerId:$ownerId,imagePath:$imagePath,registryCredentialId:$registryCredentialId}}')"

          curl --fail --show-error --silent \
            -X PATCH \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${PATCH_BODY}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}"

      - name: Trigger deploy on Render (Render pulls private Docker Hub image)
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Restart Render service
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          if [ -z "${RENDER_API_KEY}" ] || [ -z "${RENDER_SERVICE_ID}" ]; then
            echo "Missing RENDER_API_KEY or RENDER_SERVICE_ID secret."
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/restart"
