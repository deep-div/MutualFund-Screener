name: Build Docker Image and Deploy to Render

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  WORKFLOW_ENABLED: "true" # Set to "false" to disable this workflow's jobs.

concurrency:
  group: docker-render-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-toggle:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.set-enabled.outputs.enabled }}
    steps:
      - name: Read workflow toggle
        id: set-enabled
        run: echo "enabled=${{ env.WORKFLOW_ENABLED }}" >> "$GITHUB_OUTPUT"

  build-and-push:
    if: ${{ needs.workflow-toggle.outputs.enabled == 'true' }}
    needs: workflow-toggle
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mutual-fund-screener:v1.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-render:
    if: ${{ needs.workflow-toggle.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest
    needs: [workflow-toggle, build-and-push]

    steps:
      - name: Trigger deploy on Render
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
